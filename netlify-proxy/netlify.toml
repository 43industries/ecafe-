# Netlify proxy layer for School e-Café (PHP app runs on Railway).
# Deploy this folder as the Netlify site base directory, or connect the repo
# and set "Base directory" to netlify-proxy in Netlify site settings.

[build]
  command = "node scripts/generate-redirects.js"
  publish = "public"

[build.environment]
  NODE_VERSION = "20"
